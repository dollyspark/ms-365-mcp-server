name: Trigger auto deployment for cadre-mcp-test

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cadre-mcp-test-AutoDeployTrigger-ad289455-4f09-41b8-90cb-18d9be1a4145.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CADREMCPTEST_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CADREMCPTEST_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CADREMCPTEST_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cadremcptestacr2026.azurecr.io
          registryUsername: ${{ secrets.CADREMCPTEST_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CADREMCPTEST_REGISTRY_PASSWORD }}
          containerAppName: cadre-mcp-test
          resourceGroup: cadre-mcp-test-rg
          imageToBuild: cadremcptestacr2026.azurecr.io/cadre-mcp-test:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


